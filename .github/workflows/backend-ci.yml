name: Backend CI (Django)
on:
  push:
    branches: [ main, frontend, backend ]
    paths:
      - 'iles_backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, frontend, backend ]
    paths:
      - 'iles_backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: iles_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      USE_POSTGRES: "true"
      DB_NAME: iles_test_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: ./iles_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run migrations
        working-directory: ./iles_backend
        run: python manage.py migrate
      - name: Run tests
        working-directory: ./iles_backend
        run: python manage.py test
