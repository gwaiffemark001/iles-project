name: Frontend CI (React)

on:
  push:
    branches: [ main, develop, frontend, backend ]
    paths:
      - 'iles_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, frontend, backend ]
    paths:
      - 'iles_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: iles_frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./iles_frontend
        run: npm ci   

      - name: Run linting (core entry files)
        working-directory: ./iles_frontend
        run: npx eslint src/main.jsx src/ILES.jsx src/api/client.js

      - name: Build the app
        working-directory: ./iles_frontend
        run: npm run build