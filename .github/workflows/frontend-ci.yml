name: Frontend CI (React)

on:
  push:
    branches: [ main, develop, frontend, backend ]
    paths:
      - 'iles_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, frontend, backend ]
    paths:
      - 'iles_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iles_frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./iles_frontend
        run: npm ci

      - name: Run linting
        working-directory: ./iles_frontend
        run: npm run lint

      - name: Build the app
        working-directory: ./iles_frontend
        run: npm run build