name: Frontend CI (React)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'iles-frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'iles-frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'
          cache-dependency-path: iles-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./iles-frontend
        run: npm ci   

      - name: Run linting (optional)
        working-directory: ./iles-frontend
        run: npm run lint 

      - name: Build the app
        working-directory: ./iles-frontend
        run: npm run build